<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>蔡芊宥｜個人數位名片</title>
    <meta
      name="description"
      content="蔡芊宥的個人數位名片：熱愛F1的成大學生，平時也喜歡聽音樂和追星。"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Notion-ish, minimal, calm */
      :root {
        --bg: #fbfbfa;
        --surface: rgba(255, 255, 255, 0.72);
        --border: rgba(15, 15, 15, 0.08);
        --text: rgba(15, 15, 15, 0.92);
        --muted: rgba(15, 15, 15, 0.64);
        --shadow: 0 18px 60px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: "Noto Sans TC", ui-sans-serif, system-ui, -apple-system, Segoe UI,
          Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        color: var(--text);
        background: var(--bg);
        transition: background 260ms ease;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(1100px 680px at 20% 5%, rgba(255, 180, 206, 0.38), transparent 55%),
          radial-gradient(980px 620px at 90% 35%, rgba(176, 214, 255, 0.42), transparent 58%),
          radial-gradient(900px 620px at 45% 100%, rgba(205, 255, 232, 0.42), transparent 60%);
        opacity: 1;
        transition: opacity 260ms ease;
      }

      .page {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 28px 16px;
      }

      .card {
        width: min(560px, 100%);
        padding: 28px 22px 22px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: var(--surface);
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        text-align: center;
      }

      .avatar {
        width: 148px;
        height: 148px;
        margin: 6px auto 16px;
        border-radius: 999px;
        border: 1px solid var(--border);
        display: block;
        object-fit: cover;
        object-position: 50% 35%;
        overflow: hidden;
      }

      .title {
        margin: 0 0 8px;
        font-size: 30px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .subtitle {
        margin: 0 auto 18px;
        max-width: 42ch;
        color: var(--muted);
        line-height: 1.7;
        font-size: 15px;
      }

      .links {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin: 0;
        padding: 6px 0 2px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 44px;
        padding: 0 16px;
        border-radius: 12px;
        border: 1px solid rgba(15, 15, 15, 0.12);
        color: rgba(15, 15, 15, 0.88);
        text-decoration: none;
        background: rgba(255, 255, 255, 0.62);
        transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
        user-select: none;
      }

      .btn:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.78);
        border-color: rgba(15, 15, 15, 0.18);
      }

      .btn:active {
        transform: translateY(0);
      }

      .btn:focus-visible {
        outline: 3px solid rgba(255, 180, 206, 0.6);
        outline-offset: 2px;
      }

      .tip {
        margin: 14px 0 0;
        font-size: 13px;
        color: rgba(15, 15, 15, 0.52);
      }

      @media (min-width: 520px) {
        .links {
          grid-template-columns: repeat(3, 1fr);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        body {
          transition: none;
        }
        body::before {
          transition: none;
        }
        .btn {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card" aria-label="個人數位名片">
        <img class="avatar" src="./avatar.png" alt="蔡芊宥的大頭照" />

        <h1 class="title">蔡芊宥</h1>
        <p class="subtitle">我是熱愛F1的成大學生，平時也喜歡聽音樂和追星</p>

        <nav class="links" aria-label="社群連結">
          <a class="btn" href="https://www.instagram.com/blackpinkofficial/" target="_blank" rel="noreferrer noopener">Instagram</a>
          <a class="btn" href="https://www.threads.com/@f1?hl=zh-tw" target="_blank" rel="noreferrer noopener">Threads</a>
          <a class="btn" href="https://www.youtube.com/channel/UCOmHUn--16B90oW2L6FRR3A?hl=zh-TW&gl=TW&app=desktop&persist_app=1&client=mv-google" target="_blank" rel="noreferrer noopener">YouTube</a>
        </nav>

        <p class="tip" aria-hidden="true">點一下背景，會有粉嫩驚喜</p>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
